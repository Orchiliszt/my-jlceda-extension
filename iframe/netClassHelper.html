<!doctype html>
<html lang="zh-CN">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>网络类/等长网络组 - 管理工具</title>
		<link rel="stylesheet" href="/iframe/netClassHelper.css" />
	</head>
	<body>
		<div class="app-container">
			<div class="toast" id="toast"></div>

			<!-- 顶部单选 -->
			<div class="radio-section">
				<label class="radio-label"> <input type="radio" name="categoryType" value="netClass" checked /> 网络类 </label>
				<label class="radio-label"> <input type="radio" name="categoryType" value="netGroup" /> 等长网络组 </label>
			</div>

			<!-- 下拉输入框 -->
			<div class="combobox-section">
				<div class="combobox-wrapper" id="comboboxWrapper">
					<input type="text" class="combobox-input" id="comboboxInput" placeholder="请选择或输入名称..." autocomplete="off" />
					<span class="combobox-arrow" id="comboboxArrow">▼</span>
					<ul class="combobox-dropdown" id="comboboxDropdown"></ul>
				</div>
			</div>

			<!-- 筛选框 -->
			<div class="filter-section">
				<input type="text" class="filter-input" id="filterInput" placeholder="筛选网络名（模糊匹配，空则全选）..." autocomplete="off" />
			</div>

			<!-- 列表区域 -->
			<div class="list-section">
				<div class="list-container" id="listContainer" tabindex="0">
					<div class="list-inner" id="listInner">
						<div class="list-placeholder">请先选择一个网络类或等长网络组</div>
					</div>
				</div>
				<div class="list-count-hint" id="listCountHint"></div>
			</div>

			<!-- 底部按钮栏（新增应用按钮） -->
			<div class="bottom-bar">
				<button class="btn btn-add" id="btnAdd">开始添加</button>
				<button class="btn btn-remove" id="btnRemove">移除</button>
				<button class="btn btn-stop" id="btnStop">停止</button>
				<button class="btn btn-apply" id="btnApply" disabled>应用</button>
			</div>
		</div>
	</body>
	<script src="/iframe/netClassHelper.js"></script>
</html>
