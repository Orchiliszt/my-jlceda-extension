<!doctype html>
<html lang="zh-Hans">
	<head>
		<title>辅助修改网络端口设置</title>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<link rel="stylesheet" href="/iframe/index.css" />
	</head>
	<body>
		<div class="card">
			<!-- 动态行卡片区域（默认显示） -->
			<div id="rowsContainer"></div>
			<!-- 生成器视图：只显示一个输入框（初始隐藏） -->
			<div id="generatorView" class="hidden">
				<input type="text" id="generatorInput" readonly title="待修改为的网络名" />
			</div>
		</div>

		<!-- 主底部按钮栏（开始/取消） -->
		<div class="button-bar" id="mainBar">
			<button type="button" id="start">开始</button>
			<button type="button" id="cancel">取消</button>
		</div>

		<!-- 生成器底部按钮栏（自动递增/下一个/返回）初始隐藏 -->
		<div class="button-bar hidden" id="generatorBar">
			<label> <input type="checkbox" id="autoIncrement" /> 自动递增 </label>
			<button type="button" id="nextBtn">下一个</button>
			<button type="button" id="preBtn">上一个</button>
			<button type="button" id="undoBtn">撤销</button>
			<button type="button" id="backBtn">返回</button>
		</div>
	</body>
	<script src="/iframe/index.js"></script>
</html>
